[SERVICE]
    Flush         1
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224

[FILTER]
    Name          modify
    Match         *
    Add           environment docker-compose

[OUTPUT]
    Name          loki
    Match         *
    Host          loki
    Port          3100
    Labels        job=fluent-bit,service=$tag,environment=$environment
    Line_Format   json
    Auto_Kubernetes_Labels off
