global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "mac-host"
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "docker-exporter"
    static_configs:
      - targets: ["docker-exporter:9417"]

  - job_name: "telegraf-docker"
    static_configs:
      - targets: ["telegraf:9273"]