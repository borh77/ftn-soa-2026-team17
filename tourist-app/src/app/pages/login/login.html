<h2>Login</h2>

<form (ngSubmit)="onLogin()">
  <div>
    <label>Username</label>
    <input
      type="text"
      [(ngModel)]="username"
      name="username"
    />
  </div>

  <div>
    <label>Password</label>
    <input
      type="password"
      [(ngModel)]="password"
      name="password"
    />
  </div>

  <button type="submit">Login</button>
</form>

@if (errorMessage) {
  <p>{{ errorMessage }}</p>
}
