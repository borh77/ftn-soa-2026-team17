<h2>Register</h2>

<form (ngSubmit)="onRegister()">

  <div>
    <label>Username</label>
    <input
      type="text"
      [(ngModel)]="username"
      name="username"
    />
  </div>

  <div>
    <label>Email</label>
    <input
      type="email"
      [(ngModel)]="email"
      name="email"
    />
  </div>

  <div>
    <label>Password</label>
    <input
      type="password"
      [(ngModel)]="password"
      name="password"
    />
  </div>

  <div>
    <label>Role</label>

    <select
      [(ngModel)]="role"
      name="role"
    >
      <option value="TOURIST">Tourist</option>
      <option value="GUIDE">Guide</option>
    </select>
  </div>

  <button type="submit">
    Register
  </button>

</form>

@if (successMessage) {
  <p>{{ successMessage }}</p>
}

@if (errorMessage) {
  <p>{{ errorMessage }}</p>
}
