<section class="auth-shell">
  <div class="auth-copy">
    <p class="eyebrow">Join TouristApp</p>
    <h1>Create your travel role.</h1>
    <p>Register as a tourist to review tours or as a guide to create routes and publish experiences.</p>
  </div>

  <form class="auth-card" (ngSubmit)="onRegister()">
    <h2>Register</h2>

    <label>
      Username
      <input type="text" [(ngModel)]="username" name="username" />
    </label>

    <label>
      Email
      <input type="email" [(ngModel)]="email" name="email" />
    </label>

    <label>
      Password
      <input type="password" [(ngModel)]="password" name="password" />
    </label>

    <label>
      Role
      <select [(ngModel)]="role" name="role">
        <option value="TOURIST">Tourist</option>
        <option value="GUIDE">Guide</option>
      </select>
    </label>

    <button type="submit">Register</button>

    @if (successMessage) {
      <p class="auth-success">{{ successMessage }}</p>
    }

    @if (errorMessage) {
      <p class="auth-error">{{ errorMessage }}</p>
    }
  </form>
</section>
