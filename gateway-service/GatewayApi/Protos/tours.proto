syntax = "proto3";
package touristapp.tours;
option csharp_namespace = "TouristApp.Protos.Tours";
import "Protos/google/api/annotations.proto";

message GetByAuthorRequest {
  int64 authorId = 1;
  int32 page = 2;
  int32 pageSize = 3;
}

message GetActiveRequest {
  int32 page = 1;
  int32 pageSize = 2;
}

message Tour {
  int64 id = 1;
  int64 authorId = 2;
  string name = 3;
  string description = 4;
  string difficulty = 5;
  repeated string tags = 6;
  string status = 7;
  double price = 8;
  double routeLengthKm = 9;
  string publishedAt = 10;
  string archivedAt = 11;
  repeated TourTravelTime travelTimes = 12;
  repeated KeyPoint keyPoints = 13;
}

message TourTravelTime {
  string transportType = 1;
  int32 minutes = 2;
}

message KeyPoint {
  int32 ordinalNo = 1;
  string name = 2;
  string description = 3;
  string secretText = 4;
  string imageUrl = 5;
  double latitude = 6;
  double longitude = 7;
}

message GetByAuthorResponse {
  repeated Tour tours = 1;
  int32 total = 2;
}

message GetActiveResponse {
  repeated Tour tours = 1;
  int32 total = 2;
}

message StartTourRequest {
  int64 tourId = 1;
  double latitude = 2;
  double longitude = 3;
}

message CheckKeyPointProximityRequest {
  int64 executionId = 1;
  double latitude = 2;
  double longitude = 3;
}

message CompletedKeyPoint {
  int32 keyPointOrdinalNo = 1;
  string completedAt = 2;
}

message TourExecution {
  int64 id = 1;
  int64 tourId = 2;
  int64 touristId = 3;
  string status = 4;
  string startedAt = 5;
  string completedAt = 6;
  string abandonedAt = 7;
  string lastActivity = 8;
  double startedLatitude = 9;
  double startedLongitude = 10;
  repeated CompletedKeyPoint completedKeyPoints = 11;
}

message KeyPointProximityResult {
  bool reached = 1;
  int32 keyPointOrdinalNo = 2;
  string lastActivity = 3;
  TourExecution execution = 4;
}

service Tours {
  rpc GetByAuthor (GetByAuthorRequest) returns (GetByAuthorResponse) {
    option (google.api.http) = {
      get: "/tours"
    };
  }

  rpc GetActive (GetActiveRequest) returns (GetActiveResponse) {
    option (google.api.http) = {
      get: "/tours/active"
    };
  }

  rpc StartTour (StartTourRequest) returns (TourExecution) {
    option (google.api.http) = {
      post: "/tour-executions/tours/{tourId}"
      body: "*"
    };
  }

  rpc CheckKeyPointProximity (CheckKeyPointProximityRequest) returns (KeyPointProximityResult) {
    option (google.api.http) = {
      post: "/tour-executions/{executionId}/check-keypoints"
      body: "*"
    };
  }
}
