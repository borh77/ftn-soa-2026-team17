syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.soa.purchase.grpc";
option java_outer_classname = "PurchaseProto";

package purchase;

service PurchaseGrpcService {
  rpc GetCart (PurchaseUserRequest) returns (ShoppingCartResponse);
  rpc CheckoutCart (PurchaseUserRequest) returns (CheckoutResponse);
}

message PurchaseUserRequest {
  int64 touristId = 1;
}

message ShoppingCartResponse {
  int64 id = 1;
  int64 touristId = 2;
  repeated OrderItemResponse items = 3;
  double totalPrice = 4;
}

message OrderItemResponse {
  int64 id = 1;
  int64 tourId = 2;
  string tourName = 3;
  double price = 4;
}

message CheckoutResponse {
  repeated TourPurchaseTokenResponse tokens = 1;
}

message TourPurchaseTokenResponse {
  int64 id = 1;
  int64 touristId = 2;
  int64 tourId = 3;
  string tourName = 4;
  string token = 5;
  string createdAt = 6;
}