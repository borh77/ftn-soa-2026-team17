services:
  stakeholders-db:
    image: postgres:16
    container_name: stakeholders-db
    environment:
      POSTGRES_DB: stakeholders_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - stakeholders_postgres_data:/var/lib/postgresql/data
    networks:
      - soa-network

  stakeholders-service:
    build:
      context: ./stakeholders-service
      dockerfile: Dockerfile
    container_name: stakeholders-service
    restart: on-failure
    depends_on:
      - stakeholders-db
      - fluent-bit
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stakeholders-db:5432/stakeholders_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: pass
      JWT_SECRET: my-super-secret-jwt-key-2026-test
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
      - "9092:9092"
    networks:
      - soa-network
    logging: &fluentbit-logging
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "stakeholders-service"
  
  blog-mongo:
    image: mongo:7
    container_name: blog-mongo
    ports:
      - "27017:27017"
    volumes:
      - blog_mongo_data:/data/db
    networks:
      - soa-network

  blog-db:
    image: postgres:16
    container_name: blog-db
    environment:
      POSTGRES_DB: touristapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - blog_postgres_data:/var/lib/postgresql/data
    networks:
      - soa-network

  blog-service:
    build:
      context: ./blog-service
      dockerfile: Dockerfile
    container_name: blog-service
    restart: on-failure
    depends_on:
      - blog-db
      - blog-mongo
      - fluent-bit
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      DATABASE_HOST: blog-db
      DATABASE_PORT: 5432
      DATABASE_SCHEMA: touristapp
      DATABASE_SCHEMA_NAME: blog
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: root
      DATABASE_POOLING: "true"
      MONGO_CONNECTION_STRING: mongodb://blog-mongo:27017
      MONGO_DATABASE: blog
      Jwt__Secret: my-super-secret-jwt-key-2026-test
      Jwt__Expiration: 86400000
    ports:
      - "8081:80"
    networks:
      - soa-network
    logging:
      <<: *fluentbit-logging
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "blog-service"

    # follower treba da se dokerizuje zbog gateway-a

  follower-neo4j:
    image: neo4j:5
    container_name: follower-neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - follower_neo4j_data:/data
    networks:
      - soa-network

  follower-service:
    build:
      context: ./follower-service
      dockerfile: Dockerfile
    container_name: follower-service
    restart: on-failure
    depends_on:
      - follower-neo4j
      - fluent-bit
    environment:
      PORT: 8082
      NEO4J_URI: bolt://follower-neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password123
      JWT_SECRET: my-super-secret-jwt-key-2026-test
    ports:
      - "8084:8082"
    networks:
      - soa-network
    logging:
      <<: *fluentbit-logging
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "follower-service"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: soa-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - stakeholders-db
      - blog-db
      - tours-db
    networks:
      - soa-network

  tours-db:
    image: postgres:16
    container_name: tours-db
    environment:
      POSTGRES_DB: touristapp_tours
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5434:5432"
    volumes:
      - tours_postgres_data:/var/lib/postgresql/data
    networks:
      - soa-network

  tour-service:
    build:
      context: ./tour-service
      dockerfile: Dockerfile
    container_name: tour-service
    restart: on-failure
    depends_on:
      - tours-db
      - jaeger
      - fluent-bit
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DATABASE_HOST=tours-db
      - DATABASE_PORT=5432
      - DATABASE_SCHEMA=touristapp_tours
      - DATABASE_SCHEMA_NAME=tours
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=root
      - DATABASE_POOLING=true
      - Jwt__Secret=my-super-secret-jwt-key-2026-test
      - Jwt__Expiration=86400000
      - OpenTelemetry__ServiceName=tour-service
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
    ports:
      - "8083:80"
      - "8085:81"
    networks:
      - soa-network
    logging:
      <<: *fluentbit-logging
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "tour-service"

  purchase-db:
    image: postgres:16
    container_name: purchase-db
    environment:
      POSTGRES_DB: purchase_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5435:5432"
    volumes:
      - purchase_postgres_data:/var/lib/postgresql/data
    networks:
      - soa-network

  purchase-service:
    build:
      context: ./purchase-service
      dockerfile: Dockerfile
    container_name: purchase-service
    restart: on-failure
    depends_on:
      - purchase-db
      - tour-service
      - fluent-bit
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://purchase-db:5432/purchase_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: pass
      JWT_SECRET: my-super-secret-jwt-key-2026-test
      JWT_EXPIRATION: 86400000
      TOUR_SERVICE_URL: http://tour-service:80
    ports:
      - "8086:8080"
      - "9091:9091"
    networks:
      - soa-network
    logging:
      <<: *fluentbit-logging
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "purchase-service"

  gateway:
    build:
      context: ./gateway-service/GatewayApi
      dockerfile: Dockerfile
    container_name: gateway
    restart: on-failure
    depends_on:
      - blog-service
      - stakeholders-service
      - tour-service
      - follower-service
      - purchase-service
      - fluent-bit
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Grpc__TourServiceUrl=http://tour-service:81
      - Grpc__PurchaseServiceUrl=http://purchase-service:9091
      - Grpc__StakeholdersServiceUrl=http://stakeholders-service:9092
    ports:
      - "8082:8080"
    networks:
      - soa-network
    logging:
      <<: *fluentbit-logging
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "gateway"

  loki:
    image: grafana/loki:3.5.0
    container_name: soa-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - soa-network

  fluent-bit:
    image: fluent/fluent-bit:4.0
    container_name: soa-fluent-bit
    restart: unless-stopped
    depends_on:
      - loki
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    volumes:
      - ./monitoring/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
    networks:
      - soa-network

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: soa-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - soa-network

  prometheus:
    image: prom/prometheus:latest
    container_name: soa-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - soa-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: soa-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8087:8080"
    command:
      - "--docker_only=true"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:rw"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"
    networks:
      - soa-network

  grafana:
    image: grafana/grafana:latest
    container_name: soa-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - soa-network

volumes:
  stakeholders_postgres_data:
  blog_postgres_data:
  follower_neo4j_data:
  blog_mongo_data:
  tours_postgres_data:
  purchase_postgres_data:
  grafana_data:
  loki_data:

networks:
  soa-network:
    driver: bridge
